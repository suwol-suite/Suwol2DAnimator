name: Release Linux ZIP

on:
  workflow_dispatch:
    inputs:
      upload_to_github_release:
        description: "Upload generated ZIP files to the matching GitHub Release"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-linux-zip-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-linux-zip:
    name: Build Linux x64 ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Build
        run: npm run build

      - name: Verify format
        run: npm run verify:format --if-present

      - name: Build Linux ZIP
        run: npm run dist:linux:zip

      - name: Create Linux checksums
        shell: bash
        run: |
          cd release
          sha256sum *.zip > checksums-linux-x64.txt
          cat checksums-linux-x64.txt

      - name: Upload Linux ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: suwol-2d-animator-linux-x64-zip
          path: |
            release/*.zip
            release/checksums-linux-x64.txt
          if-no-files-found: error
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.upload_to_github_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.zip
            release/checksums-linux-x64.txt
          fail_on_unmatched_files: true
