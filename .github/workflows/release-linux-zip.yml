name: Release Linux ZIP

on:
  workflow_dispatch:
    inputs:
      upload_to_github_release:
        description: "Manual runs are artifact-only; tag push uploads to GitHub Release"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-linux-zip-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-linux-zip:
    name: Build Linux x64 ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Build
        run: npm run build

      - name: Verify format
        run: npm run verify:format --if-present

      - name: Build Linux ZIP
        run: npm run dist:linux:zip

      - name: Create Linux checksums
        shell: bash
        run: |
          cd release
          sha256sum *.zip > checksums-linux-x64.txt
          cat checksums-linux-x64.txt

      - name: Create Linux update manifest
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          RELEASE_TAG="v${VERSION}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi

          cd release
          ZIP_FILE="$(ls *linux-x64.zip | head -n 1)"
          ZIP_SHA="$(sha256sum "$ZIP_FILE" | awk '{print $1}')"
          ZIP_SIZE="$(stat -c%s "$ZIP_FILE")"

          cat > suwol2d-linux-x64-update.json <<EOF
          {
            "version": "$VERSION",
            "platform": "linux",
            "arch": "x64",
            "fileName": "$ZIP_FILE",
            "sha256": "$ZIP_SHA",
            "size": $ZIP_SIZE,
            "releaseTag": "$RELEASE_TAG",
            "releaseUrl": "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}",
            "publishedAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

          cat suwol2d-linux-x64-update.json

      - name: Upload Linux ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: suwol-2d-animator-linux-x64-zip
          path: |
            release/*.zip
            release/checksums-linux-x64.txt
            release/suwol2d-linux-x64-update.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.zip
            release/checksums-linux-x64.txt
            release/suwol2d-linux-x64-update.json
          fail_on_unmatched_files: true
