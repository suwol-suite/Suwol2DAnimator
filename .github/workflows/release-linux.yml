name: Release Linux

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-linux-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-linux:
    name: Build and sign Linux release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        shell: bash
        run: |
          set -euo pipefail
          npm run typecheck --if-present
          npm run lint --if-present
          npm test --if-present

      - name: Build Linux release artifacts
        run: npm run dist:linux

      - name: Import GPG private key
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          printf '%s' "$GPG_PRIVATE_KEY_B64" | base64 --decode > private.asc
          gpg --batch --import private.asc
          rm -f private.asc
        env:
          GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}

      - name: Create checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release
          find . -maxdepth 1 -type f \( \
            -name "*.AppImage" -o \
            -name "*.tar.gz" -o \
            -name "*.deb" -o \
            -name "*.rpm" \
          \) -print0 | sort -z | xargs -0 -r sha256sum > checksums.txt
          test -s checksums.txt
          cat checksums.txt

      - name: Sign checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release
          printf '%s' "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback \
            --passphrase-fd 0 \
            --armor --detach-sign checksums.txt
          test -s checksums.txt.asc
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Verify GPG signature and checksums
        shell: bash
        run: |
          set -euo pipefail
          gpg --import suwol-release-public-key.asc
          cd release
          gpg --verify checksums.txt.asc checksums.txt
          sha256sum -c checksums.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: suwol-2d-animator-linux-release
          path: |
            release/*.AppImage
            release/*.tar.gz
            release/checksums.txt
            release/checksums.txt.asc
            suwol-release-public-key.asc
          if-no-files-found: error
          retention-days: 30

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.AppImage
            release/*.tar.gz
            release/checksums.txt
            release/checksums.txt.asc
            suwol-release-public-key.asc
          fail_on_unmatched_files: true
